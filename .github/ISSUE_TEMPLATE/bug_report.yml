name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide reproducible steps.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is happening?
      placeholder: Clear and short bug description.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste console errors or attach images.
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, device, app URL
